# Vale configuration — INERT overlay. Nothing runs until you activate it
# (see README.md in this folder). Vale does PROSE linting for Markdown and
# AsciiDoc; it complements markdownlint/asciidoctor, it does not replace them.
StylesPath = styles
MinAlertLevel = warning

# Fetched by `vale sync`. Swap/extend for Google, write-good, etc.
Packages = Microsoft

Vocab = Base

[*.{md,adoc}]
BasedOnStyles = Vale, Microsoft
