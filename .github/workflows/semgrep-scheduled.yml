name: semgrep (scheduled)

# Monthly, informational security scan with Semgrep's curated registry rules —
# the heavier ruleset that is too noisy for the per-commit hook. It never gates
# a merge (not a required check); it surfaces findings for review. The pre-commit
# semgrep hook runs the project's own rules (.config/semgrep/rules/) on commits;
# this workflow runs the community rules on a schedule. Two different jobs.
on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  semgrep:
    name: semgrep (notice)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.x"

      # Pin lives in requirements-semgrep.txt so Dependabot (pip) maintains it.
      - name: Install semgrep
        run: pip install -r .github/workflows/requirements-semgrep.txt

      # Registry security rules. --metrics=off keeps it from phoning home; no
      # --error, so findings are reported but never fail the run.
      - name: Scan
        run: |
          semgrep scan \
            --config p/default \
            --metrics=off \
            --sarif-output=semgrep.sarif \
            --oss-only

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn
