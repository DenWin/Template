name: Bug report
description: Something behaves incorrectly.
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands / actions. Include the smallest case that shows it.
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual
      description: What you expected, and what happened instead (error text, exit code).
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, PowerShell version (`$PSVersionTable.PSVersion`), relevant tool versions.
    validations:
      required: false
