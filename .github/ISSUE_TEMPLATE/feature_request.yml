name: Feature request
description: Propose a change or addition.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: The need or gap this addresses. Lead with the problem, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What you want to happen. Note alternatives you considered.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope & risk
      description: Which areas change, and any backward-compatibility or security impact.
    validations:
      required: false
